services:
  minio:
    image: minio/minio:latest
    container_name: zap-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zap_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zap_secret_change_me}
      MINIO_CORS_ALLOW_ORIGIN: ${MINIO_CORS_ALLOW_ORIGIN:-http://localhost:5173}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: zap-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-zap_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-zap_secret_change_me}
    entrypoint: >
      /bin/sh -c "
      mc alias set zap http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
      mc mb --ignore-existing zap/zap-sessions;
      mc ilm add --expiry-days 1 zap/zap-sessions;
      mc anonymous set download zap/zap-sessions;
      echo '{\"Version\":\"1\",\"Statement\":[{\"Effect\":\"Allow\",\"Principal\":{\"AWS\":[\"*\"]},\"Action\":[\"s3:PutObject\",\"s3:GetObject\"],\"Resource\":[\"arn:aws:s3:::zap-sessions/*\"]}]}' > /tmp/policy.json;
      mc anonymous set-json /tmp/policy.json zap/zap-sessions;
      echo 'MinIO initialized with CORS + policy';
      "
    restart: on-failure

  valkey:
    image: valkey/valkey:latest
    container_name: zap-valkey
    command: valkey-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  minio_data:
  valkey_data:
